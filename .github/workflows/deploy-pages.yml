name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Least privilege: read the repo, write the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; newer pushes cancel in-flight builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_VAULT: '1'
          VITE_VAULT_REPO_URL: https://github.com/Deepak-Lakshmipathi/LiveOS-VaultRepo.git
          VITE_BASE: /LifeOS/
          # NO VITE_VAULT_PAT here — the token is entered at runtime and stored
          # in the browser (src/vault/pat.ts). Never add it, or it bakes into
          # the public bundle.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
