name: Agent — email-triage

# S38: reads recent unread/starred Gmail messages, classifies each with
# Claude (structured output), and writes Mail/attention.md + draft replies
# to the vault repo (LiveOS-VaultRepo), in the S36 contract format.
# See docs/agents/afk-pipeline.md for agent-placement rules.
on:
  schedule:
    # Hourly — every 30 minutes is overkill for an email inbox;
    # hourly catches everything before it goes stale without
    # burning too many Claude API tokens on an empty inbox.
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LifeOS (for the triage script + its deps)
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout LiveOS-VaultRepo
        uses: actions/checkout@v4
        with:
          repository: Deepak-Lakshmipathi/LiveOS-VaultRepo
          ref: main
          path: vault-clone
          # Own fine-grained PAT (S57 pattern): Contents R/W on
          # LiveOS-VaultRepo only. See docs/agents/vault-tokens.md.
          token: ${{ secrets.AGENT_VAULT_PAT_MAIL }}

      - name: Configure git identity for the email-triage commit
        working-directory: vault-clone
        run: |
          git config user.name "lifeos-email-triage"
          git config user.email "lifeos-email-triage@users.noreply.github.com"

      - name: Run email-triage
        env:
          VAULT_DIR: ${{ github.workspace }}/vault-clone
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agents/email-triage/triage.mjs
